builds:
  - binary: frmt
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -mod=vendor

release:
  prerelease: auto

universal_binaries:
  - replace: true

brews:
  -
    name: frmt
    homepage: "https://github.com/Shobhit-Nagpal/frmt"
    tap:
      owner: Shobhit-Nagpal
      name: homebrew-frmt
    commit_author:
      name: shobhit-nagpal
      email: shobhitsnagpal@gmail.com

checksum:
  name_template: 'checksums.txt'
